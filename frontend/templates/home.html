{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 px-4">

<div class="max-w-4xl w-full py-10">

<h1 class="text-3xl md:text-4xl font-bold text-center text-slate-800 mb-6">
Stress Monitoring System
</h1>

<p class="text-center text-gray-600 mb-10 text-sm md:text-base">
Analyze your stress using real-time GSR signals
</p>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<!-- QUICK CHECK -->
<div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg hover:shadow-xl transition">

<h3 class="text-lg md:text-xl font-semibold text-blue-600 mb-3">
⚡ Quick Check
</h3>

<p class="text-gray-600 text-sm md:text-base mb-5">
Instant stress estimation without login.
</p>

<a href="/quick_check">
<button class="w-full bg-blue-600 text-white py-3 rounded-lg">
Start Quick Check
</button>
</a>

</div>

<!-- LOGIN -->
<div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg hover:shadow-xl transition">

<h3 class="text-lg md:text-xl font-semibold text-green-600 mb-3">
🔐 Personalized
</h3>

<p class="text-gray-600 text-sm md:text-base mb-5">
Accurate stress detection with proper setup.
</p>

<a href="/login">
<button class="w-full bg-green-600 text-white py-3 rounded-lg">
Login
</button>
</a>

</div>

</div>

</div>
</div>

{% endblock %}
