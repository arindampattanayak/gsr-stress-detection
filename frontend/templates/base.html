<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stress Monitoring System</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
}

.fade-in{
animation:fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(12px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card-hover{
transition:all 0.3s ease;
}

.card-hover:hover{
transform:translateY(-5px) scale(1.01);
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.btn{
transition:all 0.25s ease;
}

.btn:hover{
transform:translateY(-2px);
}

</style>

</head>


<body class="bg-slate-100 min-h-screen fade-in">


<!-- NAVBAR -->

<nav class="bg-white shadow-md border-b">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<h1 class="text-xl font-semibold text-blue-600">
Stress Monitoring
</h1>


<div class="hidden md:flex gap-6 text-gray-700 font-medium items-center">

<a href="/dashboard" class="hover:text-blue-600 transition">
Dashboard
</a>

<a href="/calibration" class="hover:text-blue-600 transition">
Calibration
</a>

<a href="/check" class="hover:text-blue-600 transition">
Check Stress
</a>

<a href="/history" class="hover:text-blue-600 transition">
History
</a>


{% if session.get("user_id") %}

<a href="/logout"
class="px-3 py-1 rounded text-red-500 hover:bg-red-50 transition font-semibold">
Logout
</a>

{% else %}

<a href="/login" class="hover:text-blue-600 transition">
Login
</a>

<a href="/register" class="hover:text-blue-600 transition">
Register
</a>

{% endif %}

</div>

</div>

</nav>


<!-- PAGE CONTENT -->

<main class="max-w-6xl mx-auto px-6 py-10">

<div class="fade-in">

{% block content %}

{% endblock %}

</div>

</main>

</body>
</html>
