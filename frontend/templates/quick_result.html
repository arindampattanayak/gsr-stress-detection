{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-blue-100 px-4">

<div class="bg-white p-6 md:p-10 rounded-2xl shadow-xl text-center w-full max-w-md">

<h2 class="text-xl md:text-2xl font-bold text-slate-800 mb-4">
📊 Result
</h2>

<p class="text-gray-600 text-sm">Stress Score</p>
<p class="text-2xl md:text-3xl font-bold text-blue-600 mb-4">
{{ index }}
</p>

<p class="text-base md:text-lg font-semibold mb-5">
Level: <span class="text-red-500">{{ level }}</span>
</p>

{% if level in ["Moderate Stress","Elevated Stress","High Stress","Extreme Stress"] %}

<div class="bg-red-50 border border-red-200 p-4 rounded-lg mb-5">

<p class="text-red-600 text-sm md:text-base">
⚠ Stress detected
</p>

<a href="/breathing">
<button class="mt-3 w-full bg-red-500 text-white py-2 rounded-lg">
Start Breathing
</button>
</a>

</div>

{% endif %}

<a href="/">
<button class="w-full bg-gray-200 py-2 rounded-lg">
Go Home
</button>
</a>

</div>
</div>

{% endblock %}
